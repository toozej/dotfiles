# hotkeys
## keep ctrl-b as prefix so that ctrl-a goes to start of line
## make alt (meta key) also send the prefix
bind-key M send-prefix
# Enter scroll with meta-[
bind-key [ copy-mode

# reload tmux config with alt-r
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"


# window management
## window renumbering
set -g renumber-windows on

## don't change window titles
set -g allow-rename off

## Number windows and panes starting at 1
set -g base-index 1
set -g pane-base-index 1

## Aggressive window resize
setw -g aggressive-resize on

## Automatically resize to the current client
set -g window-size latest

## Better behavior when terminal dimensions change
set -g detach-on-destroy off


# split window hotkeys
bind-key -n M-v split-window -v
bind-key -n M-b split-window -h

## move between windows
bind-key -n M-Left previous-window
bind-key -n M-Right next-window

## VIM movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-z resize-pane -Z

## iterm meta+number to swap tabs
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9


# general / other
## Escape delay timing
set -sg escape-time 1

## lots of history
set -g history-limit 1000000

# Turn on mouse support
set -g mouse on


# colourschemes
## truecolour support
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

## Status bar colors
set -g status-bg "#282c34"
set -g status-fg "#61afef"

## Pane border colors
set -g pane-active-border-style fg="#61afef"
set -g pane-border-style fg="#98c379"
